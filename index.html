<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Tribe Collective</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(
        135deg,
        #18392b 0%,
        #224733 45%,
        #6f4e37 100%
      );
      color: #f4f1ea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 25%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      text-align: center;
      padding: 60px 40px;
      border-radius: 24px;
      backdrop-filter: blur(12px);
      background: rgba(18, 25, 20, 0.35);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }

    .logo {
      font-size: 16px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #d5c4a1;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 52px;
      line-height: 1.1;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .coming-soon {
      color: #d5c4a1;
      font-size: 18px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    p {
      font-size: 17px;
      line-height: 1.8;
      color: rgba(255,255,255,0.85);
      margin-bottom: 35px;
    }

    .email-btn {
      display: inline-block;
      text-decoration: none;
      background: #d5c4a1;
      color: #18392b;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .email-btn:hover {
      transform: translateY(-2px);
      background: #f1dfb7;
    }

    footer {
      margin-top: 40px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 768px) {
      .container {
        padding: 45px 25px;
      }

      h1 {
        font-size: 38px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="container">
    <div class="logo">Ocean Tribe Collective</div>

    <h1>Something Beautiful<br>Is Coming Soon</h1>

    <div class="coming-soon">Coming Soon</div>

    <p>
      We are currently building the Ocean Tribe Collective experience.
      Stay tuned for something inspired by nature, community, and the ocean spirit.
    </p>

    <a class="email-btn" href="mailto:hello@oceantribecollective.com">
      hello@oceantribecollective.com
    </a>

    <footer>
      © 2026 Ocean Tribe Collective
    </footer>
  </div>

</body>
</html>
